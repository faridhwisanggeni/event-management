services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eventmgmt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eventmgmt
      POSTGRES_PASSWORD: eventmgmt
      POSTGRES_DB: eventmgmt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventmgmt -d eventmgmt"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./event-be
      dockerfile: Dockerfile
    container_name: eventmgmt-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      LOG_LEVEL: info
      # NB: hostname `postgres` is the service name on the compose network.
      DATABASE_URL: postgresql://eventmgmt:eventmgmt@postgres:5432/eventmgmt?schema=public
      # Comma-separated allow-list of browser origins permitted to call the API.
      CORS_ORIGINS: http://localhost:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMS: ${OPENAI_EMBEDDING_DIMS:-1536}
      CONCIERGE_MAX_TOOL_ITERATIONS: 6
      CONCIERGE_LLM_TIMEOUT_MS: 30000
      SCORE_MATCH_URL: ${SCORE_MATCH_URL:-}
    ports:
      - "3001:3001"

  web:
    build:
      context: ./event-fe
      dockerfile: Dockerfile
      args:
        # Browser will hit the API on the host port (compose maps 3001 → host).
        NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
    container_name: eventmgmt-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
