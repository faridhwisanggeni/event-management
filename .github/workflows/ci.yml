name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel old runs for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───────────────────────────────────────────────────────────────
  # NestJS API: lint + unit + e2e (e2e mocks LLM and Prisma; no DB needed)
  # ───────────────────────────────────────────────────────────────
  event-be:
    name: event-be (lint + test + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-be
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: event-be/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test -- --ci --reporters=default
      - run: npm run test:e2e -- --ci --reporters=default

  # ───────────────────────────────────────────────────────────────
  # Next.js UI: lint only (build is exercised by docker job below)
  # ───────────────────────────────────────────────────────────────
  event-fe:
    name: event-fe (lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: event-fe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: event-fe/package-lock.json
      - run: npm ci
      - run: npm run lint

  # ───────────────────────────────────────────────────────────────
  # FastAPI scorer: pytest (deterministic, no network)
  # ───────────────────────────────────────────────────────────────
  score-match:
    name: score-match (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: score-match
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: score-match/requirements.txt
      - run: pip install -r requirements.txt
      - run: pip install pytest httpx
      - run: pytest -q

  # ───────────────────────────────────────────────────────────────
  # Verify all three Docker images actually build (catches Dockerfile rot
  # before merging). We don't push — this is a smoke test.
  # ───────────────────────────────────────────────────────────────
  docker-build:
    name: docker images build cleanly
    runs-on: ubuntu-latest
    needs: [event-be, event-fe, score-match]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build event-be image
        uses: docker/build-push-action@v5
        with:
          context: ./event-be
          push: false
          tags: event-be:ci
          cache-from: type=gha,scope=event-be
          cache-to: type=gha,mode=max,scope=event-be
      - name: Build event-fe image
        uses: docker/build-push-action@v5
        with:
          context: ./event-fe
          push: false
          tags: event-fe:ci
          cache-from: type=gha,scope=event-fe
          cache-to: type=gha,mode=max,scope=event-fe
      - name: Build score-match image
        uses: docker/build-push-action@v5
        with:
          context: ./score-match
          push: false
          tags: score-match:ci
          cache-from: type=gha,scope=score-match
          cache-to: type=gha,mode=max,scope=score-match
